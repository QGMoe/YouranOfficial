<ul>
    {% for item in nav_items %}
        {% if item.is_direct %}
            <li><a {% if page.id == item.id %}class="active"{% endif %} href="{{item.link}}">{{item.name}}</a></li>
        {% else %}
            <li class="dropdown">
                <a href="javascript:void(0)" class="dropbtn" {% if item.log %}class="log"{% endif %}>{{item.name}}</a>
                <div class="dropdown-content">
                    {% for child in item.children %}
                        <a{% if child.outlink %} target="_blank"{% endif %} href="{{child.link}}">{{ child.name }}</a>
                    {% endfor %}
                </div>
            </li>
        {% endif %}
    {% endfor %}
</ul>
